<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>BMW Accessories Configurator v3.3</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#1c69d3;--dark:#0a0a0a;--mid:#111;--panel:#161616;--border:#242424;--borderl:#333;--silver:#c8c8c8;--dim:#606060;--white:#f0f0f0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--white);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
#topbar{height:44px;background:#050505;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:sticky;top:0;z-index:200;}
.logo{display:flex;align-items:center;gap:10px;}
.roundel{width:30px;height:30px;border-radius:50%;border:1.5px solid #777;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;overflow:hidden;flex-shrink:0;}
.roundel div:nth-child(1),.roundel div:nth-child(4){background:#fff;}
.roundel div:nth-child(2),.roundel div:nth-child(3){background:var(--blue);}
.logo-text{font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--silver);text-transform:uppercase;line-height:1.3;}
.logo-text span{color:var(--blue);}
#langs{display:flex;gap:3px;}
.lbtn{background:none;border:1px solid var(--borderl);color:var(--dim);font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;cursor:pointer;transition:all .15s;}
.lbtn:hover{color:#fff;border-color:var(--blue);}
.lbtn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
#stepbar{height:44px;background:var(--mid);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;}
#stepbar::-webkit-scrollbar{display:none;}
.sbtn{flex:0 0 auto;background:none;border:none;border-right:1px solid var(--border);color:var(--dim);font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:0 16px;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;transition:all .15s;position:relative;}
.sbtn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:transparent;transition:background .15s;}
.sbtn:hover{color:var(--white);background:rgba(255,255,255,.04);}
.sbtn.active{color:var(--white);}
.sbtn.active::after{background:var(--blue);}
.sbtn.done{color:var(--blue);}
.snum{width:17px;height:17px;border-radius:50%;border:1.5px solid currentColor;font-size:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sbtn.active .snum,.sbtn.done .snum{background:var(--blue);border-color:var(--blue);color:#fff;}
#app{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 88px);}
#sidebar{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--borderl) transparent;}
.stitle{font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--dim);padding:12px 14px 8px;border-bottom:1px solid var(--border);}
.sitem{padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s;}
.sitem:hover{background:rgba(255,255,255,.05);}
.sitem.sel{background:rgba(28,105,211,.12);border-left:2px solid var(--blue);padding-left:12px;}
.scheck{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--borderl);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.sitem.sel .scheck{background:var(--blue);border-color:var(--blue);}
.scheck::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff;opacity:0;transition:opacity .1s;}
.sitem.sel .scheck::after{opacity:1;}
.slabel{font-size:11px;font-weight:500;color:var(--silver);line-height:1.3;}
.sitem.sel .slabel{color:var(--white);}
#content{display:flex;flex-direction:column;overflow:hidden;}
#viewer{background:#0c0c0c;flex:1;min-height:310px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#viewer::before{content:'';position:absolute;bottom:0;left:0;right:0;height:30%;background:linear-gradient(to top,rgba(28,105,211,.04),transparent);pointer-events:none;z-index:1;}
#img-stack{position:relative;width:100%;max-width:980px;line-height:0;}
#img-bkgnd{width:100%;display:block;visibility:hidden;transition:opacity .3s;}
#img-color{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;mix-blend-mode:multiply;}
.opt-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.mbadge{position:absolute;top:14px;left:18px;z-index:10;}
.mb-s{font-size:8px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;font-weight:700;}
.mb-n{font-size:20px;font-weight:300;color:var(--white);letter-spacing:.5px;line-height:1.1;}
.vbtns{position:absolute;top:14px;right:14px;z-index:10;display:flex;gap:3px;}
.vbtn{background:rgba(0,0,0,.6);border:1px solid var(--borderl);color:var(--dim);font-size:9px;letter-spacing:1px;padding:4px 9px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;backdrop-filter:blur(4px);transition:all .15s;}
.vbtn:hover,.vbtn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
#loader{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5;pointer-events:none;}
.spin{width:28px;height:28px;border:2px solid #222;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
#cfgbar{background:var(--panel);border-top:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;min-height:44px;}
.ctag{display:flex;align-items:center;gap:5px;}
.ctk{font-size:7px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--dim);}
.ctv{font-size:11px;font-weight:600;color:var(--silver);}
.cdot{width:13px;height:13px;border-radius:50%;border:1px solid rgba(255,255,255,.2);flex-shrink:0;}
.sp{flex:1;}
.btnp{background:var(--blue);color:#fff;border:none;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:8px 16px;cursor:pointer;transition:background .15s;}
.btnp:hover{background:#2479e3;}
.btns{background:transparent;color:var(--dim);border:1px solid var(--borderl);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:7px 13px;cursor:pointer;transition:all .15s;}
.btns:hover{color:#fff;border-color:var(--silver);}
#panel{background:var(--panel);border-top:1px solid var(--border);}
.shdr{background:var(--mid);border-bottom:1px solid var(--border);padding:9px 14px;font-size:8px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--blue);}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:2px;padding:2px;}
.mcard{background:rgba(255,255,255,.03);border:1px solid var(--border);padding:12px 10px;cursor:pointer;text-align:center;transition:all .15s;}
.mcard:hover{background:rgba(255,255,255,.07);border-color:var(--borderl);}
.mcard.sel{border-color:var(--blue);background:rgba(28,105,211,.1);}
.mc-s{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:3px;font-weight:700;}
.mc-n{font-size:12px;font-weight:700;color:var(--silver);}
.mcard.sel .mc-n{color:#fff;}
.mc-b{font-size:9px;color:var(--dim);margin-top:1px;}
.mc-y{font-size:9px;color:var(--blue);margin-top:1px;font-weight:600;}
.psec{padding:12px 14px;}
.ptlbl{font-size:8px;letter-spacing:3px;text-transform:uppercase;font-weight:700;color:var(--dim);margin-bottom:8px;}
.sgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:12px;}
.sw{aspect-ratio:1;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:all .15s;position:relative;}
.sw:hover{transform:scale(1.12);z-index:5;}
.sw.sel{border-color:#fff;box-shadow:0 0 0 1px var(--blue);}
.sw.dim{opacity:.2;cursor:default;}
.sw[title]:hover::after{content:attr(title);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#000;color:#fff;font-size:9px;padding:3px 7px;white-space:nowrap;pointer-events:none;z-index:20;border:1px solid var(--borderl);font-family:'Rajdhani',sans-serif;}
.wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:5px;padding:8px;max-height:220px;overflow-y:auto;}
.wcard{background:rgba(255,255,255,.03);border:1px solid var(--border);padding:9px 7px;cursor:pointer;text-align:center;transition:all .15s;border-radius:2px;}

.wcard.sel{border-color:var(--blue);background:rgba(28,105,211,.1);}

.ws{font-size:10px;font-weight:700;color:var(--blue);margin-top:2px;}
.wcard.sel .wn{color:var(--silver);}

.atab:hover{color:#fff;}
.atab.active{color:var(--blue);border-bottom-color:var(--blue);}

.aitem:hover{background:rgba(255,255,255,.05);}
.aitem.sel{background:rgba(28,105,211,.1);}
.achk{width:13px;height:13px;border:1.5px solid var(--borderl);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.aitem.sel .achk{background:var(--blue);border-color:var(--blue);}
.achk::after{content:'✓';font-size:8px;color:#fff;opacity:0;transition:opacity .1s;}
.aitem.sel .achk::after{opacity:1;}
.an{font-size:11px;font-weight:500;color:var(--silver);}
.aitem.sel .an{color:#fff;}
.sumwrap{padding:16px;max-height:280px;overflow-y:auto;}
.sumgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.sumc{background:rgba(255,255,255,.04);padding:12px;border:1px solid var(--border);}
.sumk{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:4px;font-weight:700;}
.sumv{font-size:13px;font-weight:600;color:#fff;}
.sumsub{font-size:9px;color:var(--dim);margin-top:2px;}
.sumag{margin-bottom:8px;}
.sumagn{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);font-weight:700;margin-bottom:3px;}
.sumai{font-size:10px;color:var(--silver);padding:2px 0;}
.sumdis{font-size:8px;color:var(--dim);line-height:1.6;border-top:1px solid var(--border);padding-top:10px;margin-top:12px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--borderl);border-radius:2px;}
@media(max-width:680px){#app{grid-template-columns:1fr;}#sidebar{display:none;}.sgrid{grid-template-columns:repeat(5,1fr);}}

</head>

const VL={Seite:'Side',seite:'Side',FrontSeite:'Front',frontseite:'Front',HeckSeite:'Rear',heckseite:'Rear',Front:'Front',Heck:'Rear',Interior:'Int.',interior:'Int.'};

let S={lang:'EN',step:0,series:null,model:null,paint:null,wheel:null,accs:new Set(),view:null,atab:'exterior'};
function T(k){return(LANGS[S.lang]||LANGS.EN)[k]||LANGS.EN[k]||k;}

// Get manifest data for current model+view
function mf(){
  if(!S.model||!S.view) return null;
  const mk=S.model.mk;
  return MF[mk]&&MF[mk][S.view]?MF[mk][S.view]:null;
}

function init(){renderLangs();renderSteps();renderAll();}

function renderLangs(){
  document.getElementById('langs').innerHTML=Object.keys(LANGS).map(l=>
    `<button class="lbtn${S.lang===l?' active':''}" onclick="setLang('${l}')">${l}</button>`
  ).join('');
}

function renderSteps(){
  const steps=[
    {k:'MODELS',l:'Models'},{k:'LACKE',l:'Paint'},{k:'FELGEN',l:'Wheels'},
    {k:'EXTERIEUR',l:'Exterior'},{k:'INTERIEUR',l:'Interior'},
    {k:'KOMMUNIKATION',l:'Comm.'},{k:'TRANSPORT',l:'Transport'},
    {k:'SICHERHEIT',l:'Safety'},{k:'SUM',l:'Summary'},
  ];
  document.getElementById('stepbar').innerHTML=steps.map((s,i)=>
    `<button class="sbtn${S.step===i?' active':''}${i>0&&i<=S.step?' done':''}" onclick="goStep(${i})">
      <span class="snum">${i<S.step?'✓':i+1}</span><span>${T(s.k)||s.l}</span>
    </button>`
  ).join('');
}

function renderAll(){renderSteps();renderViewer();renderCfg();renderPanel();renderSB();}

function renderViewer(){
  const m=S.model;
  document.getElementById('ds').textContent=m?'BMW '+(SERIES.find(s=>s.models.some(x=>x.id===m.id))||{name:''}).name:'BMW Series';
  document.getElementById('dm').textContent=m?m.name+' '+m.body:'Select a model';

  // Build available views from manifest
  const mk=m?m.mk:null;
  const views=mk&&MF[mk]?Object.keys(MF[mk]):[];
  if(!S.view||!views.includes(S.view)) S.view=views[0]||null;

  document.getElementById('vbtns').innerHTML=views.map(v=>
    `<button class="vbtn${S.view===v?' active':''}" onclick="setView('${v}')">${VL[v]||v}</button>`
  ).join('');

  if(!m||!S.view){
    document.getElementById('img-bkgnd').style.visibility='hidden';
    document.getElementById('loader').style.display='none';
    return;
  }
  loadBkgnd();
}

function loadBkgnd(){
  const m=S.model, v=S.view;
  const bk=document.getElementById('img-bkgnd');
  const ld=document.getElementById('loader');
  ld.style.display='block';
  bk.style.visibility='hidden';
  // Clear old option layers
  document.querySelectorAll('.opt-layer').forEach(e=>e.remove());
  document.getElementById('img-color').style.display='none';

  const url=BASE+'/images/'+m.mk+'/'+v+'/image-bkgnd.jpg';
  bk.onload=()=>{
    ld.style.display='none';
    bk.style.visibility='visible';
    applyColor();
    applyOptions();
  };
  bk.onerror=()=>{ld.querySelector('.load-txt').textContent='Image unavailable';};
  bk.src=url;
}

function applyColor(){
  const m=S.model, v=S.view;
  const ci=document.getElementById('img-color');
  if(!S.paint||!m||!v){ci.style.display='none';return;}
  const d=mf();
  // Check if this exact color key exists (case-sensitive check)
  const colorKey=d&&d.c?d.c.find(c=>c.toLowerCase()===S.paint.k.toLowerCase()):null;
  if(!colorKey){ci.style.display='none';return;}
  const url=BASE+'/images/'+m.mk+'/'+v+'/colors/'+colorKey+'.col';
  ci.onload=()=>{ci.style.display='block';};
  ci.onerror=()=>{ci.style.display='none';};
  ci.src=url;
}

function applyOptions(){
  const m=S.model, v=S.view;
  if(!m||!v) return;
  const d=mf();
  if(!d||!d.o||!d.o.length) return;
  const stack=document.getElementById('img-stack');

  // Only load option images that actually exist in manifest for this model/view
  [...S.accs].forEach(accName=>{
    const acc=Object.values(ACC).flat().find(a=>a.n===accName);
    if(!acc) return;
    // Find matching option file (case-insensitive)
    const match=d.o.find(o=>o.toLowerCase()===acc.k.toLowerCase());
    if(!match) return;
    const url=BASE+'/images/'+m.mk+'/'+v+'/options/'+match+'.jpg';
    const img=document.createElement('img');
    img.className='opt-layer';
    img.src=url;
    img.onerror=()=>img.remove();
    stack.appendChild(img);
  });
}

function renderCfg(){
  document.getElementById('cm').textContent=S.model?S.model.name+' '+S.model.body:'—';
  document.getElementById('cp').textContent=S.paint?S.paint.n:'—';
  document.getElementById('cd').style.background=S.paint?S.paint.h:'#222';
  document.getElementById('cw').textContent=S.wheel?'Styling '+S.wheel.s:'—';
  document.getElementById('co').textContent=S.accs.size;
}

function renderPanel(){
  const p=document.getElementById('panel');
  if(S.step===0) renderModels(p);
  else if(S.step===1) renderPaints(p);
  else if(S.step===2) renderWheels(p);
  else if(S.step>=3&&S.step<=7){
    const cats=['exterior','interior','communication','transport','safety'];
    renderAccs(p,cats[S.step-3]);
  }
  else if(S.step===8) renderSummary(p);
  else p.innerHTML='';
}

function renderModels(p){
  let h='<div style="max-height:calc(100vh - 320px);overflow-y:auto">';
  SERIES.forEach(s=>{
    h+=`<div class="shdr">BMW ${s.name}</div><div class="mgrid">`;
    s.models.forEach(m=>{
      const sel=S.model&&S.model.id===m.id;
      h+=`<div class="mcard${sel?' sel':''}" onclick="pickModel('${s.id}','${m.id}')">
        <div class="mc-s">${s.name}</div>
        <div class="mc-n">${m.name}</div>
        <div class="mc-b">${m.body}</div>
        <div class="mc-y">${m.year}</div>
      </div>`;
    });
    h+='</div>';
  });
  p.innerHTML=h+'</div>';
}

function renderPaints(p){
  const avail=S.model&&MF[S.model.mk]&&S.view&&MF[S.model.mk][S.view]?
    MF[S.model.mk][S.view].c.map(c=>c.toLowerCase()):[];
  
  function sw(list){
    return list.map(x=>{
      const sel=S.paint&&S.paint.k===x.k;
      const dim=avail.length>0&&!avail.includes(x.k.toLowerCase());
      const onclick=dim?'':`pickPaint('${x.k}')`;
      return `<div class="sw${sel?' sel':''}${dim?' dim':''}" style="background:${x.h}" title="${x.n}" onclick="${onclick}"></div>`;
    }).join('');
  }
  // Deduplicate paints
  const seen=new Set();
  const uni=PAINTS.filter(x=>{if(x.t==='UNI'&&!seen.has(x.n)){seen.add(x.n);return true;}return false;});
  const met=PAINTS.filter(x=>{if(x.t==='MET'&&!seen.has(x.n)){seen.add(x.n);return true;}return false;});
  
  p.innerHTML=`<div class="psec">
    <div class="ptlbl">${T('UNI')} Finishes</div>
    <div class="sgrid">${sw(uni)}</div>
    <div class="ptlbl">${T('MET')} Finishes</div>
    <div class="sgrid">${sw(met)}</div>
  </div>`;
}

function renderWheels(p){
  p.innerHTML=`<div class="wgrid">`+WHEELS.map(w=>{
    const sel=S.wheel&&S.wheel.f===w.f;
    return `<div class="wcard${sel?' sel':''}" onclick="pickWheel('${w.f}')">
      <img src="${BASE}/wheels/seite/${w.f.toLowerCase()}.jpg" alt="${w.n}" loading="lazy" onerror="this.style.opacity='.15'">
      <div class="wn">${w.n}</div>
      <div class="ws">Styling ${w.s} · ${w.z}</div>
    </div>`;
  }).join('')+'</div>';
}

function renderAccs(p,cat){
  const cats=['exterior','interior','communication','transport','safety'];
  const lbls={exterior:T('EXTERIEUR'),interior:T('INTERIEUR'),communication:T('KOMMUNIKATION'),transport:T('TRANSPORT'),safety:T('SICHERHEIT')};
  S.atab=cat;
  const tabs=cats.map(c=>`<button class="atab${S.atab===c?' active':''}" onclick="switchTab('${c}')">${lbls[c]}</button>`).join('');
  const items=(ACC[S.atab]||[]).map(a=>{
    const sel=S.accs.has(a.n);
    return `<div class="aitem${sel?' sel':''}" onclick="toggleAcc(${JSON.stringify(a.n)})">
      <div class="achk"></div><div class="an">${a.n}</div>
    </div>`;
  }).join('');
  p.innerHTML=`<div class="atabs">${tabs}</div><div class="alist">${items}</div>`;
}

function renderSummary(p){
  const m=S.model;
  const al=[...S.accs];
  const grp={};
  Object.entries(ACC).forEach(([cat,items])=>{
    const sel=al.filter(n=>items.some(a=>a.n===n));
    if(sel.length) grp[cat]=sel;
  });
  const accHtml=Object.entries(grp).map(([cat,items])=>
    `<div class="sumag"><div class="sumagn">${cat.toUpperCase()}</div>${items.map(i=>`<div class="sumai">· ${i}</div>`).join('')}</div>`
  ).join('');
  p.innerHTML=`<div class="sumwrap">
    <div style="font-size:16px;font-weight:300;color:#fff;letter-spacing:.5px;margin-bottom:14px">Your Configuration</div>
    <div class="sumgrid">
      <div class="sumc"><div class="sumk">Model</div><div class="sumv">${m?m.name+' '+m.body:'—'}</div><div class="sumsub">${m?m.year:''}</div></div>
      <div class="sumc"><div class="sumk">Paint</div><div class="sumv" style="display:flex;align-items:center;gap:7px">
        <div style="width:16px;height:16px;border-radius:2px;background:${S.paint?S.paint.h:'#222'};border:1px solid rgba(255,255,255,.15);flex-shrink:0"></div>
        <span>${S.paint?S.paint.n:'—'}</span></div><div class="sumsub">${S.paint?S.paint.t:''}</div></div>
      <div class="sumc"><div class="sumk">Wheels</div><div class="sumv">${S.wheel?'Styling '+S.wheel.s:'—'}</div><div class="sumsub">${S.wheel?S.wheel.n+' · '+S.wheel.z:''}</div></div>
      <div class="sumc"><div class="sumk">Accessories</div><div class="sumv" style="font-size:24px;font-weight:300;color:var(--blue)">${S.accs.size}</div><div class="sumsub">items selected</div></div>
    </div>
    ${accHtml||'<div style="font-size:11px;color:var(--dim)">No accessories selected.</div>'}
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btnp" onclick="window.print()">Print Layout</button>
      <button class="btns" onclick="saveConfig()">Save Config</button>
      <button class="btns" onclick="resetAll()">Reset All</button>
    </div>
    <div class="sumdis">The models illustrated here show the specifications for the German market. Subject to change in design, colours and equipment. Subject to error.</div>
  </div>`;
}

function renderSB(){
  const sb=document.getElementById('sb');
  const catMap={3:'exterior',4:'interior',5:'communication',6:'transport',7:'safety'};
  const cat=catMap[S.step];
  if(S.step===0){
    sb.innerHTML='<div class="stitle">Series</div>'+SERIES.map(s=>
      `<div class="sitem${S.series===s.id?' sel':''}" onclick="filterSeries('${s.id}')">
        <div class="scheck"></div><div class="slabel">BMW ${s.name}</div></div>`).join('');
  } else if(S.step===1&&S.paint){
    sb.innerHTML=`<div class="stitle">Selected Paint</div>
      <div style="padding:12px 14px">
        <div style="width:100%;height:50px;border-radius:2px;background:${S.paint.h};border:1px solid rgba(255,255,255,.1);margin-bottom:9px"></div>
        <div style="font-size:13px;font-weight:600;color:#fff">${S.paint.n}</div>
        <div style="font-size:9px;color:var(--dim);margin-top:2px">${S.paint.t==='MET'?'Metallic':'Solid'} · ${S.paint.k}</div>
      </div>`;
  } else if(S.step===2&&S.wheel){
    sb.innerHTML=`<div class="stitle">Selected Wheels</div>
      <div style="padding:12px 14px;text-align:center">
        <img src="${BASE}/wheels/seite/${S.wheel.f.toLowerCase()}.jpg" style="width:90px;margin:0 auto 8px;display:block;object-fit:contain" alt="">
        <div style="font-size:12px;font-weight:600;color:#fff">${S.wheel.n}</div>
        <div style="font-size:10px;color:var(--blue);margin-top:3px;font-weight:700">Styling ${S.wheel.s} · ${S.wheel.z}</div>
      </div>`;
  } else if(cat){
    const sel=[...S.accs].filter(n=>ACC[cat]&&ACC[cat].some(a=>a.n===n));
    sb.innerHTML='<div class="stitle">Selected ('+sel.length+')</div>'+
      (sel.length?sel.map(n=>`<div class="sitem sel" onclick="toggleAcc(${JSON.stringify(n)})">
        <div class="scheck"></div><div class="slabel">${n}</div></div>`).join('')
      :'<div style="padding:10px 14px;font-size:10px;color:var(--dim)">None selected</div>');
  } else if(S.step===8){
    sb.innerHTML='<div class="stitle">Summary</div>'+
      [['Model',S.model?S.model.name+' '+S.model.body:'—'],
       ['Paint',S.paint?S.paint.n:'—'],
       ['Wheels',S.wheel?'Styling '+S.wheel.s:'—'],
       ['Options',S.accs.size+' items']
      ].map(([k,v])=>`<div style="padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04)">
        <div style="font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)">${k}</div>
        <div style="font-size:12px;font-weight:600;color:#fff;margin-top:2px">${v}</div></div>`).join('');
  } else sb.innerHTML='';
}

function setLang(l){S.lang=l;renderLangs();renderAll();}
function goStep(i){S.step=i;renderAll();}
function filterSeries(id){S.series=id;renderSB();}
function pickModel(sid,mid){
  S.series=sid;
  const s=SERIES.find(x=>x.id===sid);
  S.model=s?s.models.find(m=>m.id===mid):null;
  S.paint=null;S.wheel=null;S.view=null;
  renderAll();
  setTimeout(()=>goStep(1),200);
}
function pickPaint(k){S.paint=PAINTS.find(p=>p.k===k);renderAll();}
function pickWheel(f){S.wheel=WHEELS.find(w=>w.f===f);renderAll();}
function switchTab(cat){S.atab=cat;renderAccs(document.getElementById('panel'),cat);renderSB();}
function toggleAcc(n){S.accs.has(n)?S.accs.delete(n):S.accs.add(n);renderAll();}
function setView(v){S.view=v;renderViewer();renderSB();}
function resetAll(){S.model=null;S.series=null;S.paint=null;S.wheel=null;S.accs=new Set();S.view=null;goStep(0);}
function saveConfig(){
  const b=new Blob([JSON.stringify({model:S.model,paint:S.paint,wheel:S.wheel,accessories:[...S.accs]},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='bmw-config.json';a.click();
}
init();
</script>
