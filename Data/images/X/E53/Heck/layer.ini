[CONTROL]
MAXFILES=1
BASEFILE=image.jpg

-----------------------------------------
 Scripts
-----------------------------------------

[CASE]
COUNT=3
CASE1=if GROUP "APR" = "APR-0" do 1
CASE2=if GROUP "APR" = "APR-2" do 2
CASE3=if GROUP "APR" = "APR-4" do 3

[SCRIPTS]
COUNT=3
SCRIPT1="$L 'overlays\auspuff-0.jpg' +I"
SCRIPT2="$L 'overlays\auspuff-2.jpg' +I"
SCRIPT3="$L 'overlays\auspuff-4.jpg' +I"

-----------------------------------------
 Layer
-----------------------------------------

[LAYER1]
OPTIONS=aliased[1],paint["lack"]
AUTOFILE=mask
MODE=1

[LAYER4]
OPTIONS=aliased[2]
FILE0=KEYUnterfahrschutz
MODE=128

[LAYER5]
OPTIONS=aliased[2]
FILE0=KEYAerodynamikpaket-NoPaint
MODE=0

[LAYER6]
OPTIONS=aliased[3],paint["lack"]
FILE0=KEYAerodynamikpaket
MODE=1
CONCAT=5

[LAYER7]
OPTIONS=
FILE0=KEYWeisseBlinker
MODE=0

[LAYER8]
OPTIONS=aliased[2]
FILE0=KEYZusatzscheinwerfer
MODE=0
