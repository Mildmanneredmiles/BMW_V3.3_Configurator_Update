[CONTROL]
MAXFILES=2
BASEFILE=image.jpg

-----------------------------------------
 Scripts
-----------------------------------------

[CASE]
COUNT=3
CASE1=if GROUP "APR" = "APR-1" do 1
CASE2=if GROUP "APR" = "APR-2" do 2
CASE3=if GROUP "APR" = "APR-2-C" do 3

[SCRIPTS]
COUNT=3
SCRIPT1="$L 'overlays\auspuff-1.jpg' +I"
SCRIPT2="$L 'overlays\auspuff-2.jpg' +I"
SCRIPT3="$L 'overlays\auspuff-2-c.jpg' +I"


-----------------------------------------
 Lackierung
-----------------------------------------

[LAYER1]
OPTIONS=aliased[1],paint["lack"]
AUTOFILE=mask
MODE=1

-----------------------------------------
 Aerodynamik
-----------------------------------------

[LAYER2]
OPTIONS=
FILE0=KEYAerodynamikpaket-NoPaint
MODE=0

[LAYER3]
OPTIONS=aliased[1],paint["lack"]
FILE0=KEYAerodynamikpaket
MODE=1
CONCAT=2

-----------------------------------------
 Aerodynamik
-----------------------------------------

