[CONTROL]
MAXFILES=1
BASEFILE=image.jpg

----------------------------------
  Scripts
----------------------------------

[CASE]
COUNT=1
CASE1=if GROUP "ZYL" = "8" do 1

[SCRIPTS]
COUNT=1
SCRIPT1="$L 'overlays\chromleiste.jpg' +I -M"

----------------------------------
  Layer
----------------------------------

[LAYER1]
OPTIONS=aliased[1],paint["lack"]
AUTOFILE=mask
MODE=1

[LAYER2]
OPTIONS=
FILE0=KEYNebelscheinwerfer

[LAYER3]
OPTIONS=aliased[1],paint["lack"]
FILE0=KEYAerodynamikpaket
MODE=1
CONCAT=4

[LAYER4]
OPTIONS=aliased[2]
FILE0=KEYAerodynamikpaket-NoPaint

[LAYER5]
OPTIONS=aliased[3],paint["lack"]
FILE0=KEYHeckspoiler
MODE=1
CONCAT=6

[LAYER6]
OPTIONS=
FILE0=KEYHeckspoiler-NoPaint

[LAYER7]
OPTIONS=
FILE0=KEYWeisseBlinker




