[CONTROL]
MAXFILES=1
BASEFILE=image.jpg

----------------------------------
  Scripts
----------------------------------

[CASE]
COUNT=3
CASE1=if GROUP "ZYL" = "4" do 1
CASE2=if GROUP "ZYL" = "6" do 1
CASE3=if GROUP "ZYL" = "8" do 2

[SCRIPTS]
COUNT=2
SCRIPT1="$L 'overlays\niereschwarz.jpg' +I"
SCRIPT2="$L 'overlays\nierechrom.jpg' +I"

[LAYER1]
OPTIONS=aliased[1],paint["lack"]
AUTOFILE=mask
MODE=1

[LAYER2]
OPTIONS=
FILE0=KEYNebelscheinwerfer

[LAYER7]
OPTIONS=aliased[3]
FILE0=KEYAerodynamikpaket-NoPaint

[LAYER3]
OPTIONS=aliased[1],paint["lack"]
FILE0=KEYAerodynamikpaket
MODE=1
CONCAT=7

[LAYER4]
OPTIONS=aliased[2]
FILE0=KEYDachreling

[LAYER5]
OPTIONS=
FILE0=KEYWeisseBlinker




