[CONTROL]
MAXFILES=1
BASEFILE=image.jpg

[CASE]
COUNT=6
CASE1=if GROUP "MODIF" = "A" do 1
CASE2=if GROUP "APR" = "APR-1" do 2
CASE3=if GROUP "APR" = "APR-2" do 3
CASE4=if GROUP "APR" = "APR-1-D" do 4
CASE5=if GROUP "APR" = "APR-2-D" do 5
CASE6=if GROUP "APR" = "APR-330" do 6
[SCRIPTS]

COUNT=6
SCRIPT1="$L 'overlays\basemodels.jpg' +I -M"
SCRIPT2="$L 'overlays\auspuff-1.jpg' +I"
SCRIPT3="$L 'overlays\auspuff-2.jpg' +I"
SCRIPT4="$L 'overlays\auspuff-1-D.jpg' +I"
SCRIPT5="$L 'overlays\auspuff-2-D.jpg' +I"
SCRIPT6="$L 'overlays\auspuff-330.jpg' +I"


[LAYER1]
OPTIONS=aliased[1],paint["lack"]
AUTOFILE=mask
MODE=1

[LAYER2]
OPTIONS=
FILE0=KEYAerodynamikpaket-NoPaint
MODE=0

[LAYER3]
OPTIONS=aliased[1],paint["lack"]
FILE0=KEYAerodynamikpaket
MODE=1
CONCAT=2

[LAYER4]
OPTIONS=aliased[1],paint["lack"]
FILE0=KEYHeckspoiler
MODE=1

[LAYER5]
OPTIONS=
FILE0=KEYWeisseBlinker

