[CONTROL]
MAXFILES=1
BASEFILE=image.jpg

[CASE]
COUNT=3
CASE1=if GROUP "MODIF" = "A" do 1
CASE2=if GROUP "MODIF" = "B" do 2
CASE3=if GROUP "MODIF" = "C" do 3

[SCRIPTS]
COUNT=3
SCRIPT1="$L 'overlays\basemodels.jpg' +I -M"
SCRIPT2="$L 'overlays\chromniere.jpg' +I"
SCRIPT3="$L 'overlays\chromniere.jpg' +I"  "$L 'overlays\titanblende.jpg' +I" 

[LAYER1]
OPTIONS=aliased[1],paint["lack"]
AUTOFILE=mask
MODE=1

[LAYER2]
OPTIONS=
FILE0=KEYAerodynamikpaket-NoPaint

[LAYER3]
OPTIONS=aliased[1],paint["lack"]
FILE0=KEYAerodynamikpaket
MODE=1
CONCAT=2

[LAYER4]
OPTIONS=aliased[1],paint["lack"]
FILE0=KEYHeckspoiler
MODE=1

[LAYER5]
OPTIONS=
FILE0=KEYWeisseBlinker

