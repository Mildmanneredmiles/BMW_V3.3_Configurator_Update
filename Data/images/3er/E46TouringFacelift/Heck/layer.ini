[CONTROL]
MAXFILES=1
BASEFILE=image.jpg

[CASE]
COUNT=3
CASE1=if GROUP "MODIF" = "A" do 1

[SCRIPTS]
COUNT=3
SCRIPT1="$L 'overlays\basemodels.jpg' +I -M"

[LAYER1]
OPTIONS=aliased[1],paint["lack"]
AUTOFILE=mask
MODE=1

[LAYER2]
OPTIONS=
FILE0=KEYAerodynamikpaket-NoPaint
MODE=0

[LAYER3]
OPTIONS=aliased[1],paint["lack"]
FILE0=KEYAerodynamikpaket
MODE=1
CONCAT=2

[LAYER4]
OPTIONS=aliased[2]
FILE0=KEYDachreling

[LAYER5]
OPTIONS=
FILE0=KEYWeisseBlinker



